<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quote Generator</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb')
      no-repeat center center/cover;
    }

    .container{
      width:500px;
      background:rgba(255,255,255,0.9);
      padding:30px;
      border-radius:10px;
      text-align:center;
      box-shadow:0 0 10px rgba(0,0,0,0.3);
    }

    h1{
      margin-bottom:20px;
    }

    .quote{
      font-size:22px;
      margin-bottom:15px;
      color:#333;
    }

    .author{
      font-size:18px;
      margin-bottom:20px;
      color:#555;
    }

    button{
      padding:10px 20px;
      border:none;
      background:#007bff;
      color:white;
      font-size:16px;
      border-radius:5px;
      cursor:pointer;
    }

    button:hover{
      background:#0056b3;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Quote Generator</h1>

    <div class="quote" id="quote">
      "Click the button to generate quote"
    </div>

    <div class="author" id="author">
      - Author
    </div>

    <button id="btn">New Quote</button>
  </div>

  <script>
    const quotes = [
      {
        quote: "Success is not final, failure is not fatal.",
        author: "Winston Churchill"
      },
      {
        quote: "Do something today that your future self will thank you for.",
        author: "Sean Patrick Flanery"
      },
      {
        quote: "Dream big and dare to fail.",
        author: "Norman Vaughan"
      },
      {
        quote: "Stay hungry, stay foolish.",
        author: "Steve Jobs"
      },
      {
        quote: "Believe you can and you're halfway there.",
        author: "Theodore Roosevelt"
      }
    ];

    const quoteText = document.getElementById("quote");
    const authorText = document.getElementById("author");
    const btn = document.getElementById("btn");

    btn.addEventListener("click", () => {

      const random = Math.floor(Math.random() * quotes.length);

      quoteText.innerText = `"${quotes[random].quote}"`;
      authorText.innerText = `- ${quotes[random].author}`;
    });
  </script>

</body>
</html>
